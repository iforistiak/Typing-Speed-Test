<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TYPE ARENA - Multiplayer Typing Competitions</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0f172a;
            --bg-secondary: #1e1b4b;
            --bg-tertiary: #312e81;
            --cyan: #06b6d4;
            --cyan-light: #67e8f9;
            --blue: #3b82f6;
            --purple: #a855f7;
            --pink: #ec4899;
            --green: #22c55e;
            --yellow: #eab308;
            --red: #ef4444;
            --orange: #f97316;
            --lime: #84cc16;
            --white: #ffffff;
            --gray-300: #d1d5db;
            --gray-400: #9ca3af;
            --gray-500: #6b7280;
            --gray-600: #4b5563;
            --gray-700: #374151;
            --gray-800: #1f2937;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #0f172a 100%);
            color: var(--white);
            overflow-x: hidden;
            position: relative;
            min-height: 100vh;
        }

        /* Animated Background */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 25%;
            width: 384px;
            height: 384px;
            background: radial-gradient(circle, rgba(6, 182, 212, 0.2) 0%, transparent 70%);
            border-radius: 50%;
            filter: blur(60px);
            animation: pulse 4s ease-in-out infinite;
            z-index: 0;
        }

        body::after {
            content: '';
            position: fixed;
            bottom: 0;
            right: 25%;
            width: 384px;
            height: 384px;
            background: radial-gradient(circle, rgba(168, 85, 247, 0.2) 0%, transparent 70%);
            border-radius: 50%;
            filter: blur(60px);
            animation: pulse 4s ease-in-out infinite 1s;
            z-index: 0;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }

        .animate-shake { animation: shake 0.3s; }
        .animate-slide-in { animation: slideIn 0.4s ease-out; }
        .animate-float { animation: float 3s ease-in-out infinite; }

        /* Grid Overlay */
        #gridOverlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(139, 92, 246, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(139, 92, 246, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            pointer-events: none;
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 10;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Header */
        header {
            backdrop-filter: blur(12px);
            background: rgba(0, 0, 0, 0.3);
            border-bottom: 1px solid rgba(6, 182, 212, 0.2);
            position: sticky;
            top: 0;
            z-index: 50;
            display: none;
        }

        header.active {
            display: block;
        }

        .header-content {
            max-width: 1280px;
            margin: 0 auto;
            padding: 1rem 1.5rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .header-back-btn {
            padding: 0.5rem;
            background: transparent;
            border: none;
            color: var(--white);
            cursor: pointer;
            transition: all 0.3s;
        }

        .header-back-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 0.5rem;
        }

        .header-title {
            font-size: 1.5rem;
            font-weight: 900;
            background: linear-gradient(90deg, var(--cyan), var(--blue), var(--purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            display: none;
        }

        @media (min-width: 640px) {
            .header-title {
                display: block;
            }
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 1rem;
            font-size: 0.875rem;
        }

        .player-code-display {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 0.75rem;
            background: rgba(6, 182, 212, 0.2);
            border: 1px solid rgba(6, 182, 212, 0.5);
            border-radius: 0.5rem;
        }

        .player-code-display.hidden {
            display: none;
        }

        .code-icon {
            width: 1rem;
            height: 1rem;
        }

        .player-info {
            text-align: right;
        }

        .player-name {
            color: var(--cyan);
            font-weight: bold;
            font-size: 0.875rem;
        }

        .player-status {
            color: var(--gray-400);
            font-size: 0.75rem;
        }

        /* Main Content */
        main {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }

        @media (min-width: 640px) {
            main {
                padding: 1.5rem;
            }
        }

        @media (min-width: 1024px) {
            main {
                padding: 2rem;
            }
        }

        /* Screen Visibility */
        .screen {
            display: none;
            width: 100%;
        }

        .screen.active {
            display: block;
        }

        /* Home Screen */
        .home-content {
            width: 100%;
            max-width: 1280px;
            margin: 0 auto;
            animation: slideIn 0.4s ease-out;
        }

        .home-title {
            text-align: center;
            margin-bottom: 4rem;
        }

        .home-title h1 {
            font-size: 3rem;
            font-weight: 900;
            margin-bottom: 1rem;
            letter-spacing: -0.05em;
            background: linear-gradient(90deg, var(--cyan), var(--blue), var(--purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        @media (min-width: 640px) {
            .home-title h1 {
                font-size: 3.5rem;
            }
        }

        @media (min-width: 1024px) {
            .home-title h1 {
                font-size: 4rem;
            }
        }

        .home-subtitle {
            font-size: 1.25rem;
            color: var(--gray-300);
            margin-bottom: 0.5rem;
        }

        .home-divider {
            width: 128px;
            height: 4px;
            background: linear-gradient(90deg, var(--cyan), var(--purple));
            margin: 0 auto;
            border-radius: 9999px;
        }

        .home-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 2rem;
            margin-bottom: 3rem;
        }

        @media (min-width: 768px) {
            .home-grid {
                grid-template-columns: 1fr 1fr;
            }
        }

        .game-card {
            position: relative;
            overflow: hidden;
            backdrop-filter: blur(12px);
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.1) 0%, rgba(255, 255, 255, 0.05) 100%);
            border: 2px solid rgba(6, 182, 212, 0.3);
            border-radius: 1.5rem;
            padding: 2rem;
            cursor: pointer;
            transition: all 0.3s;
            transform: scale(1);
        }

        .game-card:hover {
            border-color: rgba(6, 182, 212, 0.7);
            transform: scale(1.05);
        }

        .game-card.games {
            border-color: rgba(168, 85, 247, 0.3);
        }

        .game-card.games:hover {
            border-color: rgba(168, 85, 247, 0.7);
        }

        .game-card-icon {
            font-size: 3rem;
            margin-bottom: 1.5rem;
            display: block;
        }

        .game-card h2 {
            font-size: 1.875rem;
            font-weight: 900;
            margin-bottom: 0.75rem;
            background: linear-gradient(90deg, var(--cyan), var(--blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .game-card.games h2 {
            background: linear-gradient(90deg, var(--purple), var(--pink));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .game-card-desc {
            color: var(--gray-300);
            margin-bottom: 1rem;
        }

        .game-card-list {
            font-size: 0.875rem;
            color: var(--gray-400);
            space: 0.5rem;
            text-align: left;
        }

        .game-card-list li {
            list-style: none;
            margin: 0.5rem 0;
        }

        /* Setup Screen */
        .setup-content {
            width: 100%;
            max-width: 512px;
            margin: 0 auto;
            animation: slideIn 0.4s ease-out;
        }

        .setup-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .setup-header h1 {
            font-size: 2rem;
            font-weight: 900;
            margin-bottom: 1rem;
        }

        .setup-header p {
            color: var(--gray-300);
        }

        .setup-form {
            backdrop-filter: blur(12px);
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.1) 0%, rgba(255, 255, 255, 0.05) 100%);
            border: 1px solid rgba(6, 182, 212, 0.3);
            border-radius: 0.875rem;
            padding: 2rem;
            space: 1.5rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-label {
            display: block;
            font-size: 0.875rem;
            font-weight: bold;
            color: var(--cyan);
            margin-bottom: 0.75rem;
            letter-spacing: 0.1em;
        }

        .form-input {
            width: 100%;
            background: rgba(0, 0, 0, 0.5);
            border: 2px solid rgba(6, 182, 212, 0.5);
            color: var(--white);
            padding: 1rem;
            border-radius: 0.5rem;
            font-family: 'Courier New', monospace;
            font-size: 1.125rem;
            transition: all 0.3s;
            outline: none;
        }

        .form-input:focus {
            border-color: var(--cyan);
            box-shadow: 0 0 20px rgba(6, 182, 212, 0.3);
        }

        .form-input::placeholder {
            color: var(--gray-500);
        }

        /* Buttons */
        .btn {
            padding: 1rem 2rem;
            border: none;
            font-weight: bold;
            font-size: 1rem;
            border-radius: 0.75rem;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .btn-primary {
            width: 100%;
            background: linear-gradient(90deg, var(--cyan), var(--blue));
            color: var(--bg-primary);
            font-weight: 900;
        }

        .btn-primary:hover:not(:disabled) {
            box-shadow: 0 0 30px rgba(6, 182, 212, 0.5);
            transform: scale(1.05);
        }

        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: var(--white);
            border: 2px solid rgba(255, 255, 255, 0.3);
        }

        .btn-secondary:hover {
            border-color: var(--cyan);
        }

        .btn-success {
            background: rgba(34, 197, 94, 0.3);
            border: 1px solid var(--green);
            color: var(--green);
        }

        .btn-success:hover {
            background: rgba(34, 197, 94, 0.5);
        }

        .btn-danger {
            background: rgba(239, 68, 68, 0.3);
            border: 1px solid var(--red);
            color: var(--red);
        }

        .btn-danger:hover {
            background: rgba(239, 68, 68, 0.5);
        }

        .btn-small {
            padding: 0.5rem 1rem;
            font-size: 0.875rem;
        }

        /* Lobby Screen */
        .lobby-content {
            width: 100%;
            max-width: 1280px;
            margin: 0 auto;
            space: 2rem;
            animation: slideIn 0.4s ease-out;
        }

        .lobby-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 2rem;
        }

        @media (min-width: 1024px) {
            .lobby-grid {
                grid-template-columns: 300px 1fr;
            }
        }

        .lobby-section {
            space: 1.5rem;
        }

        .section-title {
            font-size: 1.125rem;
            font-weight: 900;
            letter-spacing: 0.1em;
            margin-bottom: 1rem;
        }

        .section-title.cyan { color: var(--cyan); }
        .section-title.purple { color: var(--purple); }
        .section-title.pink { color: var(--pink); }
        .section-title.blue { color: var(--blue); }
        .section-title.yellow { color: var(--yellow); }
        .section-title.lime { color: var(--lime); }

        /* Player Card */
        .player-card {
            backdrop-filter: blur(12px);
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.1) 0%, rgba(255, 255, 255, 0.05) 100%);
            border: 1px solid rgba(6, 182, 212, 0.2);
            border-radius: 0.5rem;
            padding: 1rem;
            transition: all 0.3s;
            margin-bottom: 0.75rem;
        }

        .player-card:hover {
            border-color: rgba(6, 182, 212, 0.5);
        }

        .player-card-header {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            margin-bottom: 0.5rem;
        }

        .player-card-name {
            font-weight: bold;
            color: var(--white);
            font-size: 0.875rem;
        }

        .player-card-code {
            font-size: 0.75rem;
            color: var(--gray-400);
            font-family: 'Courier New', monospace;
            margin-top: 0.25rem;
        }

        .status-badge {
            font-size: 0.75rem;
            font-weight: bold;
            padding: 0.25rem 0.5rem;
            border-radius: 0.25rem;
            background: rgba(34, 197, 94, 0.3);
            color: var(--green);
            display: inline-block;
            margin-top: 0.5rem;
        }

        .status-badge.host {
            background: rgba(234, 179, 8, 0.3);
            color: var(--yellow);
        }

        /* Invite Card */
        .invite-card {
            backdrop-filter: blur(12px);
            background: linear-gradient(135deg, rgba(234, 179, 8, 0.2) 0%, rgba(249, 115, 22, 0.1) 100%);
            border: 1px solid rgba(234, 179, 8, 0.5);
            border-radius: 0.5rem;
            padding: 1rem;
            margin-bottom: 0.75rem;
        }

        .invite-card-text {
            font-size: 0.875rem;
            color: #fef3c7;
            margin-bottom: 0.75rem;
        }

        .invite-actions {
            display: flex;
            gap: 0.5rem;
        }

        .invite-actions button {
            flex: 1;
        }

        /* Input Group */
        .input-group {
            display: flex;
            gap: 0.5rem;
        }

        .input-group input {
            flex: 1;
        }

        /* Settings Grid */
        .settings-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 0.75rem;
            margin-bottom: 1.5rem;
        }

        @media (max-width: 640px) {
            .settings-grid {
                grid-template-columns: repeat(3, 1fr);
                gap: 0.5rem;
            }
        }

        .setting-btn {
            padding: 0.75rem;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: var(--white);
            border-radius: 0.5rem;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 0.75rem;
            cursor: pointer;
            transition: all 0.3s;
        }

        .setting-btn:hover {
            border-color: var(--cyan);
        }

        .setting-btn.active {
            background: linear-gradient(90deg, var(--cyan), var(--blue));
            color: var(--bg-primary);
            box-shadow: 0 0 20px rgba(6, 182, 212, 0.5);
            transform: scale(1.05);
        }

        /* Invite Section */
        .invite-section {
            backdrop-filter: blur(12px);
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.1) 0%, rgba(255, 255, 255, 0.05) 100%);
            border: 1px solid rgba(59, 130, 246, 0.3);
            border-radius: 0.875rem;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .invite-section .section-title {
            color: var(--blue);
        }

        .code-display {
            font-size: 0.875rem;
            color: var(--gray-400);
            margin-bottom: 1rem;
        }

        .code-display .code-value {
            font-weight: 900;
            color: var(--cyan);
            font-size: 1.125rem;
            font-family: 'Courier New', monospace;
        }

        /* Game Screen */
        .game-content {
            width: 100%;
            max-width: 1280px;
            margin: 0 auto;
            animation: slideIn 0.4s ease-out;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 0.75rem;
            margin-bottom: 1.5rem;
        }

        @media (max-width: 640px) {
            .stats-grid {
                grid-template-columns: repeat(4, 1fr);
                gap: 0.5rem;
            }
        }

        .stat-card {
            backdrop-filter: blur(12px);
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.1) 0%, rgba(255, 255, 255, 0.05) 100%);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 0.5rem;
            padding: 1rem;
            text-align: center;
        }

        .stat-label {
            font-size: 0.75rem;
            color: var(--gray-400);
            font-weight: bold;
            letter-spacing: 0.1em;
            margin-bottom: 0.5rem;
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: 900;
            color: var(--cyan);
        }

        .stat-value.warning {
            color: var(--red);
            animation: shake 0.3s;
        }

        .stat-value.blue { color
