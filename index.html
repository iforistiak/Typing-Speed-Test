<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TYPE ARENA - Multiplayer Typing Competitions</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #0f172a 100%);
            color: #ffffff;
            position: relative;
            min-height: 100vh;
            overflow-x: hidden;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }

        .container {
            position: relative;
            z-index: 10;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            background: transparent;
        }

        header {
            backdrop-filter: blur(12px);
            background: rgba(0, 0, 0, 0.3);
            border-bottom: 1px solid rgba(6, 182, 212, 0.2);
            position: sticky;
            top: 0;
            z-index: 50;
            display: none;
        }

        header.active {
            display: block;
        }

        .header-content {
            max-width: 1280px;
            margin: 0 auto;
            padding: 1rem 1.5rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .header-back-btn {
            padding: 0.5rem;
            background: transparent;
            border: none;
            color: white;
            cursor: pointer;
            transition: all 0.3s;
        }

        .header-back-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 0.5rem;
        }

        .header-title {
            font-size: 1.5rem;
            font-weight: 900;
            background: linear-gradient(90deg, #06b6d4, #3b82f6, #a855f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: none;
        }

        @media (min-width: 640px) {
            .header-title {
                display: block;
            }
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 1rem;
            font-size: 0.875rem;
        }

        .player-code-display {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 0.75rem;
            background: rgba(6, 182, 212, 0.2);
            border: 1px solid rgba(6, 182, 212, 0.5);
            border-radius: 0.5rem;
        }

        .player-info {
            text-align: right;
        }

        .player-name {
            color: #06b6d4;
            font-weight: bold;
        }

        .player-status {
            color: #9ca3af;
            font-size: 0.75rem;
        }

        main {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }

        .screen {
            display: none;
            width: 100%;
            max-width: 1280px;
            margin: 0 auto;
            animation: slideIn 0.4s ease-out;
        }

        .screen.active {
            display: block;
        }

        .home-title {
            text-align: center;
            margin-bottom: 4rem;
        }

        .home-title h1 {
            font-size: 3rem;
            font-weight: 900;
            margin-bottom: 1rem;
            letter-spacing: -0.05em;
            background: linear-gradient(90deg, #06b6d4, #3b82f6, #a855f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        @media (min-width: 640px) {
            .home-title h1 {
                font-size: 3.5rem;
            }
        }

        @media (min-width: 1024px) {
            .home-title h1 {
                font-size: 4rem;
            }
        }

        .home-subtitle {
            font-size: 1.25rem;
            color: #d1d5db;
            margin-bottom: 0.5rem;
        }

        .home-divider {
            width: 128px;
            height: 4px;
            background: linear-gradient(90deg, #06b6d4, #a855f7);
            margin: 0 auto;
            border-radius: 9999px;
        }

        .home-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 2rem;
            margin-bottom: 3rem;
        }

        @media (min-width: 768px) {
            .home-grid {
                grid-template-columns: 1fr 1fr;
            }
        }

        .game-card {
            position: relative;
            overflow: hidden;
            backdrop-filter: blur(12px);
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.1) 0%, rgba(255, 255, 255, 0.05) 100%);
            border: 2px solid rgba(6, 182, 212, 0.3);
            border-radius: 1.5rem;
            padding: 2rem;
            cursor: pointer;
            transition: all 0.3s;
            transform: scale(1);
        }

        .game-card:hover {
            border-color: rgba(6, 182, 212, 0.7);
            transform: scale(1.05);
        }

        .game-card.games {
            border-color: rgba(168, 85, 247, 0.3);
        }

        .game-card.games:hover {
            border-color: rgba(168, 85, 247, 0.7);
        }

        .game-card-icon {
            font-size: 3rem;
            margin-bottom: 1.5rem;
            display: block;
            animation: float 3s ease-in-out infinite;
        }

        .game-card h2 {
            font-size: 1.875rem;
            font-weight: 900;
            margin-bottom: 0.75rem;
            background: linear-gradient(90deg, #06b6d4, #3b82f6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .game-card.games h2 {
            background: linear-gradient(90deg, #a855f7, #ec4899);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .game-card-desc {
            color: #d1d5db;
            margin-bottom: 1rem;
        }

        .game-card-list {
            font-size: 0.875rem;
            color: #9ca3af;
            text-align: left;
        }

        .game-card-list li {
            list-style: none;
            margin: 0.5rem 0;
        }

        .setup-content {
            width: 100%;
            max-width: 512px;
            margin: 0 auto;
        }

        .setup-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .setup-header h1 {
            font-size: 2rem;
            font-weight: 900;
            margin-bottom: 1rem;
        }

        .setup-header p {
            color: #d1d5db;
        }

        .setup-form {
            backdrop-filter: blur(12px);
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.1) 0%, rgba(255, 255, 255, 0.05) 100%);
            border: 1px solid rgba(6, 182, 212, 0.3);
            border-radius: 0.875rem;
            padding: 2rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-label {
            display: block;
            font-size: 0.875rem;
            font-weight: bold;
            color: #06b6d4;
            margin-bottom: 0.75rem;
            letter-spacing: 0.1em;
        }

        .form-input {
            width: 100%;
            background: rgba(0, 0, 0, 0.5);
            border: 2px solid rgba(6, 182, 212, 0.5);
            color: white;
            padding: 1rem;
            border-radius: 0.5rem;
            font-family: 'Courier New', monospace;
            font-size: 1.125rem;
            transition: all 0.3s;
            outline: none;
        }

        .form-input:focus {
            border-color: #06b6d4;
            box-shadow: 0 0 20px rgba(6, 182, 212, 0.3);
        }

        .form-input::placeholder {
            color: #6b7280;
        }

        .btn {
            padding: 1rem 2rem;
            border: none;
            font-weight: bold;
            font-size: 1rem;
            border-radius: 0.75rem;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .btn-primary {
            width: 100%;
            background: linear-gradient(90deg, #06b6d4, #3b82f6);
            color: #0f172a;
            font-weight: 900;
        }

        .btn-primary:hover:not(:disabled) {
            box-shadow: 0 0 30px rgba(6, 182, 212, 0.5);
            transform: scale(1.05);
        }

        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .lobby-content {
            width: 100%;
        }

        .lobby-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 2rem;
        }

        @media (min-width: 1024px) {
            .lobby-grid {
                grid-template-columns: 300px 1fr;
            }
        }

        .lobby-section {
            space: 1.5rem;
        }

        .section-title {
            font-size: 1.125rem;
            font-weight: 900;
            letter-spacing: 0.1em;
            margin-bottom: 1rem;
        }

        .section-title.cyan { color: #06b6d4; }
        .section-title.purple { color: #a855f7; }
        .section-title.blue { color: #3b82f6; }
        .section-title.lime { color: #84cc16; }

        .player-card {
            backdrop-filter: blur(12px);
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.1) 0%, rgba(255, 255, 255, 0.05) 100%);
            border: 1px solid rgba(6, 182, 212, 0.2);
            border-radius: 0.5rem;
            padding: 1rem;
            transition: all 0.3s;
            margin-bottom: 0.75rem;
        }

        .player-card:hover {
            border-color: rgba(6, 182, 212, 0.5);
        }

        .player-card-name {
            font-weight: bold;
            color: white;
            font-size: 0.875rem;
        }

        .player-card-code {
            font-size: 0.75rem;
            color: #9ca3af;
            font-family: 'Courier New', monospace;
            margin-top: 0.25rem;
        }

        .status-badge {
            font-size: 0.75rem;
            font-weight: bold;
            padding: 0.25rem 0.5rem;
            border-radius: 0.25rem;
            background: rgba(34, 197, 94, 0.3);
            color: #22c55e;
            display: inline-block;
            margin-top: 0.5rem;
        }

        .invite-section {
            backdrop-filter: blur(12px);
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.1) 0%, rgba(255, 255, 255, 0.05) 100%);
            border: 1px solid rgba(59, 130, 246, 0.3);
            border-radius: 0.875rem;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .invite-section .section-title {
            color: #3b82f6;
        }

        .code-display {
            font-size: 0.875rem;
            color: #9ca3af;
            margin-bottom: 1rem;
        }

        .code-value {
            font-weight: 900;
            color: #06b6d4;
            font-size: 1.125rem;
            font-family: 'Courier New', monospace;
        }

        .input-group {
            display: flex;
            gap: 0.5rem;
        }

        .input-group input {
            flex: 1;
        }

        .settings-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 0.75rem;
            margin-bottom: 1.5rem;
        }

        .setting-btn {
            padding: 0.75rem;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            border-radius: 0.5rem;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 0.75rem;
            cursor: pointer;
            transition: all 0.3s;
        }

        .setting-btn:hover {
            border-color: #06b6d4;
        }

        .setting-btn.active {
            background: linear-gradient(90deg, #06b6d4, #3b82f6);
            color: #0f172a;
            box-shadow: 0 0 20px rgba(6, 182, 212, 0.5);
            transform: scale(1.05);
        }

        .game-content {
            width: 100%;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 0.75rem;
            margin-bottom: 1.5rem;
        }

        .stat-card {
            backdrop-filter: blur(12px);
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.1) 0%, rgba(255, 255, 255, 0.05) 100%);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 0.5rem;
            padding: 1rem;
            text-align: center;
        }

        .stat-label {
            font-size: 0.75rem;
            color: #9ca3af;
            font-weight: bold;
            letter-spacing: 0.1em;
            margin-bottom: 0.5rem;
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: 900;
            color: #06b6d4;
        }

        .stat-value.warning {
            color: #ef4444;
            animation: shake 0.3s;
        }

        .stat-value.blue { color: #3b82f6; }
        .stat-value.green { color: #22c55e; }
        .stat-value.purple { color: #a855f7; }

        .text-display {
            backdrop-filter: blur(12px);
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.1) 0%, rgba(255, 255, 255, 0.05) 100%);
            border: 2px solid rgba(6, 182, 212, 0.5);
            border-radius: 0.875rem;
            padding: 1.5rem;
            min-height: 128px;
            margin-bottom: 1.5rem;
            line-height: 1.75;
            font-size: 1rem;
            color: #9ca3af;
            word-wrap: break-word;
            overflow-wrap: break-word;
        }

        .char-correct {
            color: #22c55e;
        }

        .char-wrong {
            color: #ef4444;
        }

        .game-display {
            backdrop-filter: blur(12px);
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.1) 0%, rgba(255, 255, 255, 0.05) 100%);
            border: 2px solid rgba(6, 182, 212, 0.5);
            border-radius: 0.875rem;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            display: none;
        }

        .game-display.active {
            display: block;
        }

        .race-bar {
            position: relative;
            height: 80px;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 0.5rem;
            overflow: hidden;
            display: flex;
            align-items: center;
            padding: 0 1rem;
        }

        .race-car {
            font-size: 2rem;
            margin-right: 1rem;
        }

        .race-progress-bar {
            flex: 1;
            height: 12px;
            background: #374151;
            border-radius: 9999px;
            overflow: hidden;
            margin-right: 1rem;
        }

        .race-progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #06b6d4, #3b82f6);
            width: 0%;
            transition: width 0.3s;
        }

        .race-percentage {
            font-weight: 900;
            color: #06b6d4;
            font-size: 1.125rem;
        }

        .ball-display {
            text-align: center;
            padding: 2rem;
        }

        .ball-container {
            position: relative;
            width: 160px;
            height: 160px;
            margin: 0 auto 1.5rem;
        }

        .ball {
            position: absolute;
            inset: 0;
            border-radius: 9999px;
            border: 8px solid #22c55e;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3.5rem;
        }

        .ball.medium {
            border-color: #eab308;
        }

        .ball.low {
            border-color: #ef4444;
        }

        .ball-hp {
            position: absolute;
            bottom: -48px;
            left: 0;
            right: 0;
            text-align: center;
            font-weight: 900;
            font-size: 1.125rem;
            color: #22c55e;
        }

        .ball-hp.medium { color: #eab308; }
        .ball-hp.low { color: #ef4444; }

        .enemies-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 0.75rem;
            margin-bottom: 1rem;
        }

        @media (min-width: 640px) {
            .enemies-grid {
                grid-template-columns: repeat(6, 1fr);
            }
        }

        .enemy-card {
            background: linear-gradient(135deg, rgba(168, 85, 247, 0.3) 0%, rgba(236, 72, 153, 0.2) 100%);
            border: 1px solid rgba(168, 85, 247, 0.5);
            border-radius: 0.5rem;
            padding: 1rem;
            text-align: center;
        }

        .enemy-icon {
            font-size: 1.875rem;
            margin-bottom: 0.75rem;
        }

        .enemies-remaining {
            text-align: center;
            color: #9ca3af;
            font-size: 0.875rem;
            margin-top: 1rem;
        }

        .word-input-section {
            backdrop-filter: blur(12px);
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(132, 204, 22, 0.5);
            border-radius: 0.875rem;
            padding: 1.5rem;
            text-align: center;
        }

        .word-label {
            font-size: 0.875rem;
            color: #9ca3af;
            margin-bottom: 0.75rem;
        }

        .current-word {
            font-size: 3rem;
            font-weight: 900;
            background: linear-gradient(90deg, #84cc16, #22c55e);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 1.5rem;
        }

        .word-input {
            width: 100%;
            background: rgba(0, 0, 0, 0.5);
            border: 2px solid rgba(132, 204, 22, 0.5);
            color: white;
            padding: 1rem;
            border-radius: 0.5rem;
            font-family: 'Courier New', monospace;
            font-size: 1.125rem;
            text-align: center;
            transition: all 0.3s;
            outline: none;
        }

        .word-input:focus {
            border-color: #84cc16;
            box-shadow: 0 0 20px rgba(132, 204, 22, 0.3);
        }

        .results-content {
            width: 100%;
        }

        .results-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .results-title {
            font-size: 3rem;
            font-weight: 900;
            background: linear-gradient(90deg, #06b6d4, #3b82f6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 1rem;
        }

        .results-stats {
            backdrop-filter: blur(12px);
            background: linear-gradient(13
